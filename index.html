<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>실도로 출장맵</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta property="og:title" content="실도로 출장맵">
<meta property="og:description" content="오늘 출장 어디로 가지..?">
<meta property="og:image" content="preview_image.jpg">
<meta property="og:url" content="https://skylink6346.github.io/test/">
<meta property="og:type" content="website">

<style>

html, body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    font-family: 'Noto Sans KR', Arial, sans-serif;
    display:flex;
    flex-direction:column;
    background:#f0f2f5;
}

#header{
    padding:14px 15px;
    background:#ffffff;
    border-bottom:1px solid #ddd;
    text-align:center;
}

#map{
    flex:1;
    margin:15px;
    border:3px solid #333;
    border-radius:10px;
    position:relative;
    background:white;
}

.categoryBox{
    position:absolute;
    top:15px;
    left:15px;
    z-index:10;
    display:flex;
    background:white;
    border-radius:6px;
    overflow:hidden;
    border:1px solid #ccc;
}

.subCategoryBox{
    position:absolute;
    top:60px;
    left:15px;
    z-index:10;
    display:none;
    background:white;
    border-radius:6px;
    overflow:hidden;
    border:1px solid #ccc;
}

.categoryBox button,
.subCategoryBox button{
    height:36px;
    padding:0 16px;
    border:none;
    border-right:1px solid #ddd;
    background:white;
    font-weight:600;
    cursor:pointer;
}

.categoryBox button:last-child,
.subCategoryBox button:last-child{
    border-right:none;
}

.categoryBox button.active,
.subCategoryBox button.active{
    background:#2b7cff;
    color:white;
}

.routeBtn{
    position:absolute;
    top:15px;
    right:15px;
    z-index:10;
    padding:8px 14px;
    background:#ff6b00;
    color:white;
    border:none;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
}

.routePanel{
    position:absolute;
    top:60px;
    right:15px;
    z-index:10;
    width:240px;
    background:white;
    border:1px solid #ccc;
    border-radius:8px;
    padding:10px;
    display:none;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    box-sizing:border-box;
}

.routePanelGrip{
    margin:-10px -10px 8px -10px;
    padding:8px 10px 6px 10px;
    border-bottom:1px solid #eee;
    cursor:move;
    touch-action:none;
    user-select:none;
}

.routePanelGripDots{
    width:36px;
    height:6px;
    margin:0 auto;
    border-radius:3px;
    background:repeating-linear-gradient(
        to right,
        #c8c8c8 0px,
        #c8c8c8 4px,
        transparent 4px,
        transparent 7px
    );
}

.routeItem{
    font-size:13px;
    padding:8px;
    border-bottom:1px solid #eee;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:grab;
    background:#fff;
    user-select:none;
    gap:8px;
}

.routeItem.dragging{
    opacity:0.5;
}

.routeItemLeft{
    display:flex;
    align-items:center;
    gap:8px;
    min-width:0;
}

.dragHandle{
    font-size:16px;
    color:#888;
    line-height:1;
}

.routeText{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.routeItem button{
    border:none;
    background:#ff6b00;
    color:white;
    border-radius:4px;
    padding:4px 8px;
    cursor:pointer;
    flex-shrink:0;
}

.routeActions{
    margin-top:10px;
    display:flex;
    gap:8px;
}

.clearBtn{
    width:100%;
    padding:6px;
    background:#ff6b00;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.actionBtn{
    flex:1;
    padding:6px;
    background:#ff6b00;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

/* 현재 위치 버튼 */
.locationBtn{
    position:absolute;
    right:15px;
    bottom:15px;
    z-index:10;
    width:42px;
    height:42px;
    border:1px solid #ccc;
    border-radius:50%;
    background:#ffffff;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
}

.locationBtn:hover{
    background:#f7f7f7;
}

.locationBtn svg{
    width:22px;
    height:22px;
    display:block;
}

.currentLocationDot{
    width:14px;
    height:14px;
    background:#2b7cff;
    border:3px solid rgba(43,124,255,0.25);
    border-radius:50%;
    box-sizing:border-box;
}

/* 인포윈도우 커스텀 */
.infoWrap{
    position:relative;
    padding:5px 22px 5px 6px;
    font-size:11px;
    line-height:1.25;
    min-width:84px;
    letter-spacing:-0.1px;
}

.infoClose{
    position:absolute;
    top:4px;
    right:4px;
    width:14px;
    height:14px;
    border:none;
    background:#eee;
    border-radius:50%;
    font-size:9px;
    line-height:14px;
    text-align:center;
    cursor:pointer;
    padding:0;
}

.infoClose:hover{
    background:#ddd;
}

.infoOrder{
    position:absolute;
    top:20px;
    right:4px;
    min-width:14px;
    height:14px;
    padding:0 3px;
    background:#ff6b00;
    color:white;
    border-radius:7px;
    font-size:9px;
    line-height:14px;
    text-align:center;
    font-weight:600;
    box-sizing:border-box;
}

.infoText{
    margin:0;
    padding:0;
    word-break:keep-all;
}

.infoLink{
    display:inline-block;
    margin-top:4px;
    color:#2b7cff;
    text-decoration:none;
    font-weight:600;
    font-size:10px;
    line-height:1.1;
}

.infoLink:hover{
    text-decoration:underline;
}

@media screen and (max-width: 768px){

    #header{
        padding:10px 12px;
        font-size:14px;
    }

    #map{
        margin:10px;
        border-width:2px;
    }

    .categoryBox{
        top:10px;
        left:10px;
        transform:scale(0.78);
        transform-origin:top left;
    }

    .subCategoryBox{
        top:45px;
        left:10px;
        transform:scale(0.78);
        transform-origin:top left;
    }

    .routePanel{
        top:92px;
        left:10px;
        right:auto;
        width:180px;
        padding:8px;
        border-radius:7px;
    }

    .routePanelGrip{
        margin:-8px -8px 7px -8px;
        padding:7px 8px 5px 8px;
    }

    .routePanelGripDots{
        width:30px;
        height:5px;
    }

    .routeItem{
        font-size:11px;
        padding:6px;
        gap:6px;
    }

    .routeItemLeft{
        gap:6px;
    }

    .dragHandle{
        font-size:13px;
    }

    .routeItem button{
        padding:3px 6px;
        font-size:11px;
    }

    .routeActions{
        margin-top:8px;
        gap:6px;
    }

    .actionBtn,
    .clearBtn{
        padding:5px;
        font-size:11px;
        border-radius:4px;
    }

    .locationBtn{
        right:10px;
        bottom:10px;
        width:36px;
        height:36px;
    }

    .locationBtn svg{
        width:19px;
        height:19px;
    }

    .currentLocationDot{
        width:12px;
        height:12px;
        border-width:2px;
    }

    .infoWrap{
        font-size:10px;
        min-width:76px;
        padding:4px 20px 4px 5px;
        line-height:1.2;
    }

    .infoClose{
        top:3px;
        right:3px;
        width:13px;
        height:13px;
        font-size:8px;
        line-height:13px;
    }

    .infoOrder{
        top:18px;
        right:3px;
        min-width:13px;
        height:13px;
        padding:0 2px;
        font-size:8px;
        line-height:13px;
        border-radius:6.5px;
    }

    .infoLink{
        margin-top:3px;
        font-size:9px;
    }
}

</style>

</head>

<body>

<div id="header">
    안녕하세요, 출장맵 입니다.
</div>

<div id="map">

    <div id="routePanel" class="routePanel"></div>

    <div class="categoryBox">
        <button class="active" onclick="showCategory(event,'all')">전체</button>
        <button onclick="showCategory(event,'hill')">등판로</button>
        <button onclick="showCategory(event,'tunnel')">방음터널</button>
        <button onclick="showCategory(event,'nscc')">NSCC-C</button>
    </div>

    <div class="subCategoryBox" id="subBox">
        <button onclick="filterHill(event,'all')">전체</button>
        <button onclick="filterHill(event,'4')">4%</button>
        <button onclick="filterHill(event,'8')">8%</button>
    </div>

    <button class="locationBtn" onclick="moveToCurrentLocation()" aria-label="현재 위치">
        <svg viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="2.5" x2="12" y2="6"></line>
            <line x1="12" y1="18" x2="12" y2="21.5"></line>
            <line x1="2.5" y1="12" x2="6" y2="12"></line>
            <line x1="18" y1="12" x2="21.5" y2="12"></line>
        </svg>
    </button>

</div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=6bb54b3dc1397cbd2c37e8589769b6f4"></script>

<script>

var mapContainer = document.getElementById('map'),
    mapOption = {
        center: new kakao.maps.LatLng(37.39405, 127.02518),
        level: 5
    };

var map = new kakao.maps.Map(mapContainer, mapOption);

var markerImages = {
    hill: new kakao.maps.MarkerImage("RED.png", new kakao.maps.Size(23,35), { offset: new kakao.maps.Point(11.5,35) }),
    tunnel: new kakao.maps.MarkerImage("GREEN.png", new kakao.maps.Size(23,35), { offset: new kakao.maps.Point(11.5,35) }),
    nscc: new kakao.maps.MarkerImage("SKY.png", new kakao.maps.Size(23,35), { offset: new kakao.maps.Point(11.5,35) })
};

var data = [
    [37.39405,127.02518,'<div style="padding:5px">등판로<br>중속영역 8%</div>','hill','8'],
    [37.28008,127.31003,'<div style="padding:5px">등판로</div>','hill','4'],
    [37.18862,127.08822,'<div style="padding:5px">방음터널</div>','tunnel',''],
    [37.47123,128.10681,'<div style="padding:5px">NSCC-C</div>','nscc',''],
    [37.39575,127.04223,'<div style="padding:5px">등판로<br>저속영역 4%</div>','hill','4'],
    [37.25297,126.82222,'<div style="padding:5px">등판로<br>중속영역 4%</div>','hill','4'],
    [37.24014,126.82044,'<div style="padding:5px">등판로<br>중속영역 4%</div>','hill','4'],
    [37.23824,126.95171,'<div style="padding:5px">방음벽</div>','tunnel',''],
    [37.32335,127.11599,'<div style="padding:5px">방음터널</div>','tunnel',''],
    [37.29368,127.08184,'<div style="padding:5px">방음터널</div>','tunnel',''],
    [37.29554,127.06980,'<div style="padding:5px">방음터널<br>지하차도</div>','tunnel',''],
    [37.30217,127.04831,'<div style="padding:5px">방음터널<br>직사각형</div>','tunnel',''],
    [37.31529,126.98152,'<div style="padding:5px">NSCC-C</div>','nscc',''],
    [37.21216,126.96567,'<div style="padding:5px">방음터널<br>지하차도</div>','tunnel','']
];

var markers = [];
var selectedMarkers = [];
var dragIndex = null;
var currentLocation = null;
var currentLocationOverlay = null;
var panelDragActive = false;
var panelDragOffsetX = 0;
var panelDragOffsetY = 0;

function getMarkerLabel(marker){
    var text = marker.rawHtml
        .replace('<div style="padding:5px">','')
        .replace('</div>','')
        .replace(/<br\s*\/?>/gi, ' | ')
        .replace(/<[^>]*>/g, '')
        .trim();

    return text || '경유지';
}

function getRouteLabel(marker){
    return getMarkerLabel(marker).replace(/\|/g, '-');
}

function getMarkerOrder(marker){
    return selectedMarkers.indexOf(marker) + 1;
}

function buildInfoContent(marker){
    var order = getMarkerOrder(marker);
    var orderHtml = '';

    if(order > 0){
        orderHtml = '<div class="infoOrder">' + order + '</div>';
    }

    var bodyContent = marker.rawHtml
        .replace('<div style="padding:5px">','')
        .replace('</div>','');

    return '' +
        '<div class="infoWrap">' +
            '<button class="infoClose" onclick="removeMarkerById(' + marker.id + ')">×</button>' +
            orderHtml +
            '<div class="infoText">' + bodyContent + '</div>' +
            '<a class="infoLink" href="https://map.kakao.com/link/to/목적지,' + marker.lat + ',' + marker.lng + '" target="_blank">앱에서 보기</a>' +
        '</div>';
}

function refreshInfoWindows(){
    markers.forEach(function(marker){
        if(marker.infowindow){
            marker.infowindow.setContent(buildInfoContent(marker));
            if(marker.selected){
                marker.infowindow.open(map, marker);
            }
        }
    });
}

function setCurrentLocationDot(lat, lng){
    currentLocation = {
        lat: lat,
        lng: lng
    };

    var position = new kakao.maps.LatLng(lat, lng);

    if(currentLocationOverlay){
        currentLocationOverlay.setMap(null);
    }

    var dot = document.createElement('div');
    dot.className = 'currentLocationDot';

    currentLocationOverlay = new kakao.maps.CustomOverlay({
        position: position,
        content: dot,
        yAnchor: 0.5,
        xAnchor: 0.5
    });

    currentLocationOverlay.setMap(map);
}

function getCurrentLocation(successCallback, errorCallback){
    if(!navigator.geolocation){
        if(errorCallback) errorCallback();
        return;
    }

    navigator.geolocation.getCurrentPosition(
        function(position){
            var lat = position.coords.latitude;
            var lng = position.coords.longitude;
            setCurrentLocationDot(lat, lng);
            if(successCallback) successCallback(lat, lng);
        },
        function(){
            if(errorCallback) errorCallback();
        },
        {
            enableHighAccuracy: true,
            timeout: 5000,
            maximumAge: 0
        }
    );
}

function moveToCurrentLocation(){
    getCurrentLocation(
        function(lat, lng){
            map.setCenter(new kakao.maps.LatLng(lat, lng));
        },
        function(){
            alert("현재 위치를 가져올 수 없습니다.");
        }
    );
}

function initCurrentLocation(){
    getCurrentLocation(
        function(lat, lng){
            map.setCenter(new kakao.maps.LatLng(lat, lng));
        },
        function(){
        }
    );
}

function removeMarker(m){
    if(!m) return;

    m.selected = false;
    m.setOpacity(1);
    if(m.infowindow) m.infowindow.close();
    selectedMarkers = selectedMarkers.filter(function(x){ return x !== m; });
    updateRoutePanel();
}

function removeMarkerById(id){
    for(var i=0; i<markers.length; i++){
        if(markers[i].id === id){
            removeMarker(markers[i]);
            break;
        }
    }
}

/* 드래그 */
function dragStart(e, i){
    dragIndex = i;
    e.currentTarget.classList.add("dragging");
}

function dragOver(e){
    e.preventDefault();
}

function dragEnd(e){
    e.currentTarget.classList.remove("dragging");
}

function drop(e, i){
    e.preventDefault();

    if(dragIndex === null || dragIndex === i) {
        dragIndex = null;
        return;
    }

    var moved = selectedMarkers.splice(dragIndex,1)[0];
    selectedMarkers.splice(i,0,moved);
    dragIndex = null;
    updateRoutePanel();
}

/* 경유지 패널 이동 */
function getClientPoint(e){
    if(e.touches && e.touches.length > 0){
        return {
            x: e.touches[0].clientX,
            y: e.touches[0].clientY
        };
    }
    if(e.changedTouches && e.changedTouches.length > 0){
        return {
            x: e.changedTouches[0].clientX,
            y: e.changedTouches[0].clientY
        };
    }
    return {
        x: e.clientX,
        y: e.clientY
    };
}

function startPanelDrag(e){
    var panel = document.getElementById("routePanel");
    if(!panel || panel.style.display === "none") return;

    var point = getClientPoint(e);
    var rect = panel.getBoundingClientRect();
    var mapRect = mapContainer.getBoundingClientRect();

    var fixedLeft = rect.left - mapRect.left;
    var fixedTop = rect.top - mapRect.top;

    panel.style.left = fixedLeft + "px";
    panel.style.top = fixedTop + "px";
    panel.style.right = "auto";

    panelDragActive = true;
    panelDragOffsetX = point.x - rect.left;
    panelDragOffsetY = point.y - rect.top;

    if(e.cancelable){
        e.preventDefault();
    }
}

function movePanelDrag(e){
    if(!panelDragActive) return;

    var panel = document.getElementById("routePanel");
    var mapRect = mapContainer.getBoundingClientRect();
    var point = getClientPoint(e);

    var newLeft = point.x - mapRect.left - panelDragOffsetX;
    var newTop = point.y - mapRect.top - panelDragOffsetY;

    var maxLeft = mapContainer.clientWidth - panel.offsetWidth - 6;
    var maxTop = mapContainer.clientHeight - panel.offsetHeight - 6;

    if(newLeft < 6) newLeft = 6;
    if(newTop < 6) newTop = 6;
    if(newLeft > maxLeft) newLeft = maxLeft;
    if(newTop > maxTop) newTop = maxTop;

    panel.style.left = newLeft + "px";
    panel.style.top = newTop + "px";
    panel.style.right = "auto";

    if(e.cancelable){
        e.preventDefault();
    }
}

function endPanelDrag(){
    panelDragActive = false;
}

function resetMobileRoutePanelPosition(){
    var panel = document.getElementById("routePanel");
    if(!panel) return;

    if(window.innerWidth <= 768){
        panel.style.left = "10px";
        panel.style.top = "92px";
        panel.style.right = "auto";
    } else {
        panel.style.left = "";
        panel.style.top = "";
        panel.style.right = "15px";
    }
}

document.addEventListener("mousemove", movePanelDrag);
document.addEventListener("mouseup", endPanelDrag);
document.addEventListener("touchmove", movePanelDrag, { passive:false });
document.addEventListener("touchend", endPanelDrag);
window.addEventListener("resize", function(){
    resetMobileRoutePanelPosition();
});

for (var i=0; i < data.length; i++) {

    var lat = data[i][0];
    var lng = data[i][1];
    var category = data[i][3];

    var marker = new kakao.maps.Marker({
        position: new kakao.maps.LatLng(lat, lng),
        image: markerImages[category]
    });

    marker.setMap(map);
    marker.id = i;
    marker.category = category;
    marker.percent = data[i][4];
    marker.lat = lat;
    marker.lng = lng;
    marker.selected = false;
    marker.rawHtml = data[i][2];

    var infowindow = new kakao.maps.InfoWindow({
        content : buildInfoContent(marker),
        removable : false
    });

    marker.infowindow = infowindow;
    markers.push(marker);

    kakao.maps.event.addListener(marker, 'click', function(m) {
        return function() {

            if(m.selected){
                removeMarker(m);
            } else {
                m.selected = true;
                selectedMarkers.push(m);
                m.setOpacity(0.5);
                m.infowindow.setContent(buildInfoContent(m));
                m.infowindow.open(map, m);
                updateRoutePanel();
            }

        };
    }(marker));
}

function updateRoutePanel(){

    var panel = document.getElementById("routePanel");
    var wasHidden = (panel.style.display === "none" || panel.style.display === "");

    if(selectedMarkers.length === 0){
        panel.style.display = "none";
        panel.innerHTML = "";
        refreshInfoWindows();
        return;
    }

    panel.style.display = "block";

    var html = `
    <div class="routePanelGrip" onmousedown="startPanelDrag(event)" ontouchstart="startPanelDrag(event)">
        <div class="routePanelGripDots"></div>
    </div>`;

    selectedMarkers.forEach(function(m, i){

        html += `
        <div class="routeItem"
            draggable="true"
            ondragstart="dragStart(event, ${i})"
            ondragover="dragOver(event)"
            ondrop="drop(event, ${i})"
            ondragend="dragEnd(event)">
            <div class="routeItemLeft">
                <span class="dragHandle">☰</span>
                <span class="routeText">${i+1}. ${getMarkerLabel(m)}</span>
            </div>
            <button onclick="removeItem(${i})">X</button>
        </div>`;
    });

    html += `
    <div class="routeActions">
        <button class="actionBtn" onclick="createRoute()">경로 생성</button>
        <button class="actionBtn" onclick="clearAll()">선택 초기화</button>
    </div>`;

    panel.innerHTML = html;

    if(wasHidden){
        resetMobileRoutePanelPosition();
    }

    refreshInfoWindows();
}

function removeItem(i){
    removeMarker(selectedMarkers[i]);
}

function clearAll(){
    selectedMarkers.forEach(function(m){
        m.selected = false;
        m.setOpacity(1);
        if(m.infowindow) m.infowindow.close();
    });
    selectedMarkers = [];
    updateRoutePanel();
}

function createRoute(){

    if(selectedMarkers.length < 1){
        alert("마커를 선택하세요");
        return;
    }

    function openRouteWithStops(startLat, startLng){
        var segments = [];
        segments.push("현재위치," + startLat + "," + startLng);

        selectedMarkers.forEach(function(m){
            segments.push(getRouteLabel(m) + "," + m.lat + "," + m.lng);
        });

        var url = "https://map.kakao.com/link/by/car/" + segments.join("/");
        window.open(encodeURI(url));
    }

    function openFallbackRoute(){
        if(selectedMarkers.length === 1){
            var one = selectedMarkers[0];
            window.open(encodeURI("https://map.kakao.com/link/to/" + getRouteLabel(one) + "," + one.lat + "," + one.lng));
            return;
        }

        var segments = [];
        selectedMarkers.forEach(function(m){
            segments.push(getRouteLabel(m) + "," + m.lat + "," + m.lng);
        });

        var url = "https://map.kakao.com/link/by/car/" + segments.join("/");
        window.open(encodeURI(url));
    }

    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(
            function(position){
                currentLocation = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude
                };

                setCurrentLocationDot(currentLocation.lat, currentLocation.lng);
                openRouteWithStops(currentLocation.lat, currentLocation.lng);
            },
            function(){
                openFallbackRoute();
            },
            {
                enableHighAccuracy: true,
                timeout: 5000,
                maximumAge: 0
            }
        );
    } else {
        openFallbackRoute();
    }
}

function showCategory(event,category){

    var subBox = document.getElementById("subBox");

    if(category === "hill"){
        subBox.style.display = "flex";
    } else {
        subBox.style.display = "none";
    }

    for(var i=0;i<markers.length;i++){

        if(category === "all"){
            markers[i].setMap(map);

        } else if(markers[i].category === category){
            markers[i].setMap(map);

        } else {
            markers[i].setMap(null);
        }
    }

    var buttons = document.querySelectorAll(".categoryBox button");
    buttons.forEach(function(btn){
        btn.classList.remove("active");
    });
    event.target.classList.add("active");
}

function filterHill(event,percent){

    for(var i=0;i<markers.length;i++){

        if(markers[i].category === "hill"){
            if(percent === "all" || markers[i].percent === percent){
                markers[i].setMap(map);
            } else {
                markers[i].setMap(null);
            }
        } else {
            markers[i].setMap(null);
        }
    }

    var buttons = document.querySelectorAll(".subCategoryBox button");
    buttons.forEach(function(btn){
        btn.classList.remove("active");
    });
    event.target.classList.add("active");
}

initCurrentLocation();

</script>

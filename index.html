<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>실도로 출장맵</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    font-family: 'Noto Sans KR', Arial, sans-serif;
    display:flex;
    flex-direction:column;
    background:#f0f2f5;
}

#header{
    padding:20px 15px;
    background:#ffffff;
    border-bottom:1px solid #ddd;
    text-align:center;
}

#map{
    flex:1;
    margin:15px;
    border:3px solid #333;
    border-radius:10px;
    position:relative;
    background:white;
}

/* 카테고리 */
.categoryBox{
    position:absolute;
    top:15px;
    left:15px;
    z-index:10;
    display:flex;
    background:white;
    border-radius:6px;
    overflow:hidden;
    border:1px solid #ccc;
}

/* 서브 카테고리 */
.subCategoryBox{
    position:absolute;
    top:60px;
    left:15px;
    z-index:10;
    display:none; /* 기본 숨김 */
    background:white;
    border-radius:6px;
    overflow:hidden;
    border:1px solid #ccc;
}

button{
    height:36px;
    padding:0 16px;
    border:none;
    border-right:1px solid #ddd;
    background:white;
    font-weight:600;
    cursor:pointer;
}

button:last-child{
    border-right:none;
}

button.active{
    background:#2b7cff;
    color:white;
}
</style>

</head>

<body>

<div id="header">
    출장맵 입니다.
</div>

<div id="map">

    <!-- 메인 카테고리 -->
    <div class="categoryBox">
        <button class="active" onclick="showCategory(event,'all')">전체</button>
        <button onclick="showCategory(event,'hill')">등판로</button>
        <button onclick="showCategory(event,'tunnel')">방음터널</button>
        <button onclick="showCategory(event,'nscc')">NSCC-C</button>
    </div>

    <!-- 등판로 서브 카테고리 -->
    <div class="subCategoryBox" id="subBox">
        <button onclick="filterHill(event,'all')">전체</button>
        <button onclick="filterHill(event,'4')">4%</button>
        <button onclick="filterHill(event,'8')">8%</button>
    </div>

</div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_KEY&libraries=clusterer"></script>

<script>

var map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(37.39405, 127.02518),
    level: 5
});

var clusterer = new kakao.maps.MarkerClusterer({
    map: map,
    averageCenter: true,
    minLevel: 10
});

/* 데이터 (중요: 5번째 값 추가 = 경사도) */
var data = [
    [37.39405,127.02518,'8%','hill'],
    [37.28008,127.31003,'4%','hill'],
    [37.39575,127.04223,'4%','hill'],
    [37.25297,126.82222,'4%','hill'],
    [37.47123,128.10681,'','nscc'],
    [37.18862,127.08822,'','tunnel']
];

var markers = [];

/* 마커 생성 */
for (var i=0; i < data.length; i++) {

    var marker = new kakao.maps.Marker({
        position: new kakao.maps.LatLng(data[i][0], data[i][1])
    });

    marker.category = data[i][3];
    marker.percent = data[i][2];

    markers.push(marker);
}

clusterer.addMarkers(markers);

/* 메인 카테고리 */
function showCategory(event, category){

    clusterer.clear();

    var subBox = document.getElementById("subBox");

    /* 등판로 선택 시만 서브 표시 */
    if(category === "hill"){
        subBox.style.display = "flex";
    } else {
        subBox.style.display = "none";
        resetSubButtons();
    }

    var filtered = [];

    for(var i=0;i<markers.length;i++){
        if(category === "all" || markers[i].category === category){
            filtered.push(markers[i]);
        }
    }

    clusterer.addMarkers(filtered);

    setActive(event, ".categoryBox button");
}

/* 등판로 세부 필터 */
function filterHill(event, percent){

    clusterer.clear();

    var filtered = [];

    for(var i=0;i<markers.length;i++){
        if(markers[i].category === "hill"){
            if(percent === "all" || markers[i].percent.includes(percent)){
                filtered.push(markers[i]);
            }
        }
    }

    clusterer.addMarkers(filtered);

    setActive(event, ".subCategoryBox button");
}

/* active 처리 */
function setActive(event, selector){
    var buttons = document.querySelectorAll(selector);
    buttons.forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");
}

/* 서브 버튼 초기화 */
function resetSubButtons(){
    var buttons = document.querySelectorAll(".subCategoryBox button");
    buttons.forEach(btn => btn.classList.remove("active"));
}

</script>

</body>
</html>

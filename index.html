<!DOCTYPE html>

<html>

<head>

    <meta charset="utf-8">
    <title>실도로 출장맵</title>

    <meta property="og:title" content="실도로 출장맵">
    <meta property="og:description" content="출장 위치를 지도에서 확인하세요">
    <meta property="og:image" content="https://skylink6346.github.io/test/preview_image.jpg">
    <meta property="og:url" content="https://skylink6346.github.io/test/">
    <meta property="og:type" content="website">
    
    <meta name="viewport" content="width=device-width, initial-scale=1">

</head>

<body>

    <div id="map" style="width: calc(100vw-40px); height: calc(100vh - 40px); margin:20px; border: 5px solid black;border-radius: 10px;"></div>

    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=6bb54b3dc1397cbd2c37e8589769b6f4&libraries=clusterer"></script>

    <script>

        var mapContainer = document.getElementById('map'), // 지도를 표시할 div

            mapOption = {

                center: new kakao.maps.LatLng(37.15724, 126.82404), // 지도의 중심좌표

                level: 5, // 지도의 확대 레벨

                mapTypeId : kakao.maps.MapTypeId.ROADMAP // 지도종류

            };

 

        // 지도를 생성한다

        var map = new kakao.maps.Map(mapContainer, mapOption);

 

            // 마커 클러스터러를 생성합니다

        var clusterer = new kakao.maps.MarkerClusterer({

            map: map, // 마커들을 클러스터로 관리하고 표시할 지도 객체

            averageCenter: true, // 클러스터에 포함된 마커들의 평균 위치를 클러스터 마커 위치로 설정

            minLevel: 10 // 클러스터 할 최소 지도 레벨

        });

       

        var data = [

            [37.15724, 126.82404, '<div style="padding:5px">사무실</div>'],

            [37.39405, 127.02518, '<div style="padding:5px">등판로<br>도깨비도로</div>'],

            [37.28008, 127.31003, '<div style="padding:5px">등판로<br>도척 </div>'],

        ];

 

        var markers = [];

 

        for (var i=0; i < data.length; i++) {

 

        // 지도에 마커를 생성하고 표시한다

        var marker = new kakao.maps.Marker({

            position: new kakao.maps.LatLng(data[i][0], data[i][1]), // 마커의 좌표

            map: map // 마커를 표시할 지도 객체

        });

       

        // 인포윈도우를 생성합니다

        var infowindow = new kakao.maps.InfoWindow({

            content : data[i][2]

        });

       

        // 마커 위에 인포윈도우를 표시합니다. 두번째 파라미터인 marker를 넣어주지 않으면 지도 위에 표시됩니다

        //infowindow.open(map, marker);

        markers.push(marker);

 

        kakao.maps.event.addListener(marker, 'mouseover', makeOverListener(map, marker, infowindow));

        kakao.maps.event.addListener(marker, 'mouseout', makeOutListener(infowindow));

 

        }

 

        // 클러스터러에 마커들을 추가합니다

        clusterer.addMarkers(markers);

 

        // 인포윈도우를 표시하는 클로저를 만드는 함수입니다

        function makeOverListener(map, marker, infowindow) {

            return function() {

                infowindow.open(map, marker);

            };

        }

       

        // 인포윈도우를 닫는 클로저를 만드는 함수입니다

        function makeOutListener(infowindow) {

            return function() {

                infowindow.close();

            };

        }

       

        </script>

    </body>

</html>

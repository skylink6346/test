<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>실도로 출장맵</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta property="og:title" content="실도로 출장맵">
<meta property="og:description" content="오늘 출장 어디로 가지..?">
<meta property="og:image" content="preview_image.jpg">
<meta property="og:url" content="https://skylink6346.github.io/test/">
<meta property="og:type" content="website">

<style>

html, body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    font-family: 'Noto Sans KR', Arial, sans-serif;
    display:flex;
    flex-direction:column;
    background:#f0f2f5;
}

#header{
    padding:20px 15px;
    background:#ffffff;
    border-bottom:1px solid #ddd;
    text-align:center;
}

#map{
    flex:1;
    margin:15px;
    border:3px solid #333;
    border-radius:10px;
    position:relative;
    background:white;
}

.categoryBox{
    position:absolute;
    top:15px;
    left:15px;
    z-index:10;
    display:flex;
    background:white;
    border-radius:6px;
    overflow:hidden;
    border:1px solid #ccc;
}

.subCategoryBox{
    position:absolute;
    top:60px;
    left:15px;
    z-index:10;
    display:none;
    background:white;
    border-radius:6px;
    overflow:hidden;
    border:1px solid #ccc;
}

.categoryBox button,
.subCategoryBox button{
    height:36px;
    padding:0 16px;
    border:none;
    border-right:1px solid #ddd;
    background:white;
    font-weight:600;
    cursor:pointer;
}

.categoryBox button:last-child,
.subCategoryBox button:last-child{
    border-right:none;
}

.categoryBox button.active,
.subCategoryBox button.active{
    background:#2b7cff;
    color:white;
}

/* 추가 UI */
.routeBtn{
    position:absolute;
    top:15px;
    right:15px;
    z-index:10;
    padding:8px 14px;
    background:#ff6b00;
    color:white;
    border:none;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
}

.routePanel{
    position:absolute;
    top:60px;
    right:15px;
    z-index:10;
    width:220px;
    background:white;
    border:1px solid #ccc;
    border-radius:8px;
    padding:10px;
    display:none;
}

.routeItem{
    font-size:13px;
    padding:6px;
    border-bottom:1px solid #eee;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.clearBtn{
    margin-top:10px;
    width:100%;
    padding:6px;
    background:#999;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

</style>

</head>

<body>

<div id="header">
    안녕하세요, 출장맵 입니다.<br>
    지도에 추가하실 정보를 알려주시면 감사하겠습니다!
</div>

<div id="map">

    <button class="routeBtn" onclick="createRoute()">경로 생성</button>
    <div id="routePanel" class="routePanel"></div>

    <div class="categoryBox">
        <button class="active" onclick="showCategory(event,'all')">전체</button>
        <button onclick="showCategory(event,'hill')">등판로</button>
        <button onclick="showCategory(event,'tunnel')">방음터널</button>
        <button onclick="showCategory(event,'nscc')">NSCC-C</button>
    </div>

    <div class="subCategoryBox" id="subBox">
        <button onclick="filterHill(event,'all')">전체</button>
        <button onclick="filterHill(event,'4')">4%</button>
        <button onclick="filterHill(event,'8')">8%</button>
    </div>

</div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=6bb54b3dc1397cbd2c37e8589769b6f4"></script>

<script>

var mapContainer = document.getElementById('map'),
    mapOption = {
        center: new kakao.maps.LatLng(37.39405, 127.02518),
        level: 5
    };

var map = new kakao.maps.Map(mapContainer, mapOption);

var markerImages = {
    hill: new kakao.maps.MarkerImage("RED.png", new kakao.maps.Size(23,35), { offset: new kakao.maps.Point(11.5,35) }),
    tunnel: new kakao.maps.MarkerImage("GREEN.png", new kakao.maps.Size(23,35), { offset: new kakao.maps.Point(11.5,35) }),
    nscc: new kakao.maps.MarkerImage("SKY.png", new kakao.maps.Size(23,35), { offset: new kakao.maps.Point(11.5,35) })
};

var data = [
    [37.39405,127.02518,'<div style="padding:5px">등판로<br>중속영역 8%</div>','hill','8'],
    [37.28008,127.31003,'<div style="padding:5px">등판로</div>','hill','4'],
    [37.18862,127.08822,'<div style="padding:5px">방음터널</div>','tunnel',''],
    [37.47123,128.10681,'<div style="padding:5px">NSCC-C</div>','nscc',''],
    [37.39575,127.04223,'<div style="padding:5px">등판로<br>저속영역 4%</div>','hill','4'],
    [37.25297,126.82222,'<div style="padding:5px">등판로<br>중속영역 4%</div>','hill','4'],
    [37.24014,126.82044,'<div style="padding:5px">등판로<br>중속영역 4%</div>','hill','4'],
    [37.23824,126.95171,'<div style="padding:5px">방음벽</div>','tunnel',''],
    [37.32335,127.11599,'<div style="padding:5px">방음터널</div>','tunnel',''],
    [37.29368,127.08184,'<div style="padding:5px">방음터널</div>','tunnel',''],
    [37.29554,127.06980,'<div style="padding:5px">방음터널<br>지하차도</div>','tunnel',''],
    [37.30217,127.04831,'<div style="padding:5px">방음터널<br>직사각형</div>','tunnel',''],
    [37.31529,126.98152,'<div style="padding:5px">NSCC-C</div>','nscc',''],
    [37.21216,126.96567,'<div style="padding:5px">방음터널<br>지하차도</div>','tunnel','']
];

var markers = [];
var selectedMarkers = [];

for (var i=0; i < data.length; i++) {

    var lat = data[i][0];
    var lng = data[i][1];
    var category = data[i][3];

    var marker = new kakao.maps.Marker({
        position: new kakao.maps.LatLng(lat, lng),
        image: markerImages[category]
    });

    marker.setMap(map);
    marker.category = category;
    marker.percent = data[i][4];
    marker.lat = lat;
    marker.lng = lng;
    marker.selected = false;

    var content =
        '<div style="padding:5px;">' +
        data[i][2].replace('<div style="padding:5px">','').replace('</div>','') +
        '<br>' +
        '<a href="https://map.kakao.com/link/to/목적지,' + lat + ',' + lng + '" target="_blank" style="display:inline-block;margin-top:6px;padding:4px 8px;background:#2b7cff;color:white;border-radius:4px;font-size:12px;text-decoration:none;">지도앱에서보기</a>' +
        '</div>';

    var infowindow = new kakao.maps.InfoWindow({
        content : content,
        removable : true
    });

    markers.push(marker);

    // 기존 이벤트 유지
    kakao.maps.event.addListener(marker, 'click', makeOverListener(map, marker, infowindow));

    // ✅ 추가 이벤트 (선택 기능)
    kakao.maps.event.addListener(marker, 'click', function(m) {
        return function() {

            m.selected = !m.selected;

            if(m.selected){
                selectedMarkers.push(m);
                m.setOpacity(0.5);
            } else {
                selectedMarkers = selectedMarkers.filter(x => x !== m);
                m.setOpacity(1);
            }

            updateRoutePanel();
        };
    }(marker));
}

/* 기존 함수 유지 */
function makeOverListener(map, marker, infowindow) {
    return function() {
        infowindow.open(map, marker);
    };
}

/* UI 업데이트 */
function updateRoutePanel(){

    var panel = document.getElementById("routePanel");

    if(selectedMarkers.length === 0){
        panel.style.display = "none";
        return;
    }

    panel.style.display = "block";

    var html = "";

    selectedMarkers.forEach(function(m, i){

        html += `
        <div class="routeItem">
            <span>${i+1}번 경유지</span>
            <div>
                <button onclick="moveUp(${i})">↑</button>
                <button onclick="moveDown(${i})">↓</button>
                <button onclick="removeItem(${i})">X</button>
            </div>
        </div>`;
    });

    html += `<button class="clearBtn" onclick="clearAll()">선택 초기화</button>`;

    panel.innerHTML = html;
}

function moveUp(i){
    if(i===0) return;
    [selectedMarkers[i], selectedMarkers[i-1]] = [selectedMarkers[i-1], selectedMarkers[i]];
    updateRoutePanel();
}

function moveDown(i){
    if(i===selectedMarkers.length-1) return;
    [selectedMarkers[i], selectedMarkers[i+1]] = [selectedMarkers[i+1], selectedMarkers[i]];
    updateRoutePanel();
}

function removeItem(i){
    selectedMarkers[i].selected = false;
    selectedMarkers[i].setOpacity(1);
    selectedMarkers.splice(i,1);
    updateRoutePanel();
}

function clearAll(){
    selectedMarkers.forEach(m=>{
        m.selected=false;
        m.setOpacity(1);
    });
    selectedMarkers=[];
    updateRoutePanel();
}

function createRoute(){

    if(selectedMarkers.length < 2){
        alert("마커를 2개 이상 선택하세요");
        return;
    }

    var url = "https://map.kakao.com/link/to/";

    selectedMarkers.forEach(function(m,i){
        url += (i+1)+","+m.lat+","+m.lng+"/";
    });

    window.open(url);
}

/* 기존 필터 그대로 */
function showCategory(event,category){

    var subBox = document.getElementById("subBox");

    if(category === "hill"){
        subBox.style.display = "flex";
    } else {
        subBox.style.display = "none";
    }

    for(var i=0;i<markers.length;i++){

        if(category === "all"){
            markers[i].setMap(map);

        } else if(markers[i].category === category){
            markers[i].setMap(map);

        } else {
            markers[i].setMap(null);
        }
    }

    var buttons = document.querySelectorAll(".categoryBox button");
    buttons.forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");
}

function filterHill(event,percent){

    for(var i=0;i<markers.length;i++){

        if(markers[i].category === "hill"){
            if(percent === "all" || markers[i].percent === percent){
                markers[i].setMap(map);
            } else {
                markers[i].setMap(null);
            }
        } else {
            markers[i].setMap(null);
        }
    }

    var buttons = document.querySelectorAll(".subCategoryBox button");
    buttons.forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");
}

</script>

</body>
</html>
